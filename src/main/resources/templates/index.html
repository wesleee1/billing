<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Violet Billing Studio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #2f004f, #7b2cbf);
            color: #fff;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }
        .hero, .card {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 18px;
            padding: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
        .hero { margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        form { display: grid; gap: 10px; }
        input, button { padding: 10px; border-radius: 10px; border: none; }
        button { background: #ffcf56; color: #2f004f; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); text-align: left; }
        .badge { display: inline-block; background: #d8b4fe; color: #3b0764; padding: 6px 10px; border-radius: 999px; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>Billing OM</h1>
        <p>Create and review customer orders.</p>
    </div>
    <div class="grid">
        <div class="card">
            <h2>New Order</h2>
            <form th:action="@{/orders}" th:object="${order}" method="post">
                <input type="text" th:field="*{customerName}" placeholder="Customer name" required>
                <input type="text" th:field="*{itemName}" placeholder="Item name" required>
                <input type="number" th:field="*{quantity}" placeholder="Quantity" required>
                <input type="number" step="0.01" th:field="*{unitPrice}" placeholder="Unit price" required>
                <button type="submit">Create Billing Order</button>
                <div th:if="${successMessage}" style="color:#d1fae5; margin-top:8px;" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" style="color:#ffd6d6; margin-top:8px;" th:text="${errorMessage}"></div>
            </form>
        </div>
        <div class="card">
            <h2>Recent Order</h2>
            <table>
                <thead>
                <tr>
                    <th>Customer</th>
                    <th>Item</th>
                    <th>Total</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.customerName}"></td>
                    <td th:text="${order.itemName}"></td>
                    <td th:text="${order.totalAmount}"></td>
                    <td><span class="badge" th:text="${order.status}"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
